site_name: Notes
theme:
  name: material
  features:
    - navigation.indexes
    - content.action.edit
    - content.code.copy
repo_url: https://github.com/PME26Elvis/llm-research-archive
edit_uri: edit/main/docs/
plugins:
  - search
  - tags
  - blog:
      blog_dir: timeline
      post_dir: timeline/posts
  - meta
  - awesome-pages
  - git-revision-date-localized:
      type: date
      fallback_to_build_date: true
markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
